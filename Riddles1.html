
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Labyrinth of Logic - LWKHO - Riddles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Public+Sans:wght@300;600;800&display=swap');

        :root {
            --glass: rgba(0, 0, 0, 0.884);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glow: rgba(99, 102, 241, 0.4);
        }

        * {
            cursor: none !important; /* Hide system cursor globally */
        }

        body {
            font-family: 'Public Sans', sans-serif;
            background-image: url('https://www.gardenia.net/wp-content/uploads/2023/05/types-of-flowers.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e2e8f0;
            overflow: hidden;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        /* Custom Glow Follower */
        #mouse-glow {
            position: fixed;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
            transition: width 0.3s, height 0.3s;
        }

        @media (hover: none) {
            #mouse-glow { display: none; }
            * { cursor: auto !important; }
        }

        .serif-font { font-family: 'Crimson Pro', serif; }

        /* INTENSE GLASS BLUR CONTAINER */
        .chamber-card {
            background: var(--glass);
            /* Massive blur effect */
            backdrop-filter: blur(100px) saturate(250%) brightness(80%);
            -webkit-backdrop-filter: blur(100px) saturate(250%) brightness(80%);
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 30px 120px -20px rgba(0, 0, 0, 0.9),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            border-radius: 3rem;
            animation: floating 12s ease-in-out infinite, glassPulse 8s infinite alternate;
            position: relative;
        }

        .option-btn {
            background: rgba(0, 0, 0, 0.884);
            font-size: xx-large;
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.884);
            border-color: rgba(255, 255, 255, 0.4);
            color: rgb(0, 0, 0);
            transform: translateY(-5px) scale(1.03);
        }

        @keyframes glassPulse {
            from { border-color: rgba(255, 255, 255, 0.1); }
            to { border-color: rgba(255, 255, 255, 0.25); }
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(0.4deg); }
        }

        .fade-in { 
            animation: slideUpIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        @keyframes slideUpIn {
            from { opacity: 0; transform: translateY(60px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            50% { transform: translate3d(4px, 0, 0); }
        }

        .progress-dot { transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }

        @media (max-width: 640px) {
            .chamber-card { 
                padding: 2rem 1.5rem !important; 
                border-radius: 2rem;
            }
            #riddle-content { font-size: 1.4rem !important; line-height: 1.5; }
        }
    </style>
</head>
<body>

    <div id="mouse-glow"></div>

    <div id="progress-container" class="fixed top-8 flex flex-wrap justify-center max-w-[90vw] gap-3 z-50"></div>

    <div id="game-box" class="w-full max-w-2xl px-4 fade-in z-20">
        <div class="chamber-card p-12 sm:p-20">
            <header style="display: none;" class="mb-12">
                <div class="flex justify-between items-center">
                    <span id="level-label" class="text-[10px] font-bold tracking-[0.6em] text-indigo-200/50 uppercase">Session Link</span>
                    <button onclick="revealHint()" id="hint-btn" class="text-[9px] font-black tracking-widest text-white/40 hover:text-white transition-all uppercase px-5 py-2 border border-white/10 rounded-full hover:bg-white/10">
                        Focus
                    </button>
                </div>
                <h1 style=" display: none;" id="chamber-title" class="text-3xl sm:text-5xl font-black mt-4 bg-clip-text text-transparent bg-gradient-to-r from-white to-white/20 tracking-tighter">Connecting...</h1>
            </header>

            <div class="mb-14 min-h-[180px] flex items-center justify-center">
                <p id="riddle-content" class="serif-font text-2xl sm:text-4xl leading-snug italic text-white/95 text-center px-4">
                    <!-- Text -->
                     LWKHO 
                </p>
            </div>

            <div id="options-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <!-- Options -->
            </div>

            <div id="feedback" class="mt-10 text-center h-4 text-[9px] font-black tracking-[0.5em] uppercase opacity-0 transition-all duration-700">
                Reflection Denied
            </div>
        </div>

        <div class="mt-10 flex justify-between items-center px-10 opacity-30 text-[9px] font-bold tracking-[0.6em] uppercase">
            <div>Score: <span id="stat-score" class="text-indigo-300">0</span></div>
            <div>Sanity: <span id="stat-sanity" class="text-indigo-300">100</span></div>
        </div>
    </div>

    <div style="background: black;border-radius: 7.5%;" id="victory-screen" class="hidden text-center fade-in z-20 px-6">
        <h2 class="text-6xl sm:text-9xl font-black mb-8 bg-clip-text text-transparent bg-gradient-to-b from-white to-white/10 tracking-tighter">Shattered</h2>
        <p class="text-white/40 mb-14 text-xl sm:text-3xl serif-font italic max-w-xl mx-auto">The labyrinth has yielded its secrets to your clarity.</p>
        <div class="bg-white/5 backdrop-blur-[100px] p-12 sm:p-20 rounded-[4rem] border border-white/10 inline-block min-w-[320px]">
            <p class="text-[11px] uppercase tracking-[0.7em] opacity-30 mb-5">Truth Quotient</p>
            <p id="final-score-display" class="text-7xl sm:text-9xl font-black text-white">0</p>
        </div>
        <div class="mt-16">
            <button onclick="location.reload()" class="bg-white/10 backdrop-blur-xl px-16 py-7 rounded-full font-black tracking-widest uppercase text-xs transition-all hover:bg-white/20 hover:scale-105 border border-white/5">Re-materialize</button>
        </div>
    </div>

    <script>
        const RIDDLE_POOL = [
            { title: "Voice", text: "I speak without a mouth and hear without ears. I have no body, but I come alive with wind.", answer: "ECHO", options: ["ECHO", "WIND", "VOICE", "SPIRIT"], hint: "I am a repetition." },
            { title: "Infinity", text: "Rotate me and I am all. Cut me and I am nothing.", answer: "8", options: ["0", "8", "9", "6"], hint: "Check the number 8." },
            { title: "Darkness", text: "The more of me there is, the less you see.", answer: "DARK", options: ["FOG", "DARK", "SMOKE", "BLIND"], hint: "Night brings me." },
            { title: "Map", text: "I have cities but no houses, mountains but no trees, water but no fish.", answer: "MAP", options: ["MAP", "GLOBE", "ATLAS", "DREAM"], hint: "I am paper-born." },
            { title: "The Key", text: "What has keys but can't open a single lock?", answer: "PIANO", options: ["PIANO", "CHEST", "MAP", "CODE"], hint: "Music is my lock." },
            { title: "Silence", text: "What is so fragile that saying its name breaks it?", answer: "SILENCE", options: ["GLASS", "SILENCE", "TRUST", "EGG"], hint: "Quiet please." },
            { title: "Bubble", text: "Lighter than a feather, yet even the strongest cannot hold me for long.", answer: "BREATH", options: ["BREATH", "BUBBLE", "SIGH", "AIR"], hint: "Inhale, exhale." },
            { title: "The Bank", text: "I have branches, but no fruit, trunk, or leaves.", answer: "BANK", options: ["BANK", "RIVER", "ROAD", "TREE"], hint: "Think of money." }
            
        ];

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

        const SESSION_LENGTH = 5;
        const RIDDLES = shuffle([...RIDDLE_POOL]).slice(0, SESSION_LENGTH);

        let currentLevel = 0;
        let score = 0;
        let sanity = 100;

        const glow = document.getElementById('mouse-glow');
        window.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        function initProgress() {
            const container = document.getElementById('progress-container');
            container.innerHTML = '';
            RIDDLES.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.id = `dot-${i}`;
                dot.className = `progress-dot h-2 rounded-full ${i === 0 ? 'bg-white w-14' : 'bg-white/5 w-3'}`;
                container.appendChild(dot);
            });
        }

        function updateUI() {
            const data = RIDDLES[currentLevel];
            const gameBox = document.getElementById('game-box');
            
            gameBox.style.opacity = '0';
            gameBox.style.transform = 'translateY(40px) scale(0.96)';
            
            setTimeout(() => {
                document.getElementById('level-label').innerText = `Chamber ${currentLevel + 1}`;
                document.getElementById('chamber-title').innerText = data.title;
                document.getElementById('riddle-content').innerText = `"${data.text}"`;
                document.getElementById('feedback').classList.add('opacity-0');
                
                const grid = document.getElementById('options-grid');
                grid.innerHTML = '';
                shuffle([...data.options]).forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn p-8 rounded-[2.5rem] text-[10px] font-bold tracking-[0.3em] uppercase";
                    btn.innerText = opt;
                    btn.onclick = () => selectOption(opt);
                    grid.appendChild(btn);
                });

                RIDDLES.forEach((_, i) => {
                    const dot = document.getElementById(`dot-${i}`);
                    if (i === currentLevel) dot.className = "progress-dot w-14 h-2 rounded-full bg-white shadow-[0_0_25px_rgba(255,255,255,0.4)]";
                    else if (i < currentLevel) dot.className = "progress-dot w-3 h-2 rounded-full bg-white/40";
                    else dot.className = "progress-dot w-3 h-2 rounded-full bg-white/5";
                });

                gameBox.style.opacity = '1';
                gameBox.style.transform = 'translateY(0) scale(1)';
            }, 700);
        }

        function selectOption(selected) {
            const correct = RIDDLES[currentLevel].answer;
            const feedback = document.getElementById('feedback');

            if (selected === correct) {
                score += (sanity * 25);
                document.getElementById('stat-score').innerText = score.toLocaleString();
                if (currentLevel < RIDDLES.length - 1) {
                    currentLevel++;
                    updateUI();
                } else {
                    document.getElementById('game-box').style.display = 'none';
                    document.getElementById('victory-screen').classList.remove('hidden');
                    document.getElementById('progress-container').classList.add('hidden');
                    document.getElementById('final-score-display').innerText = score.toLocaleString();
                }
            } else {
                feedback.innerText = "Dissonance detected";
                feedback.classList.remove('opacity-0');
                document.querySelector('.chamber-card').classList.add('shake');
                sanity = Math.max(0, sanity - 20);
                document.getElementById('stat-sanity').innerText = sanity;
                setTimeout(() => document.querySelector('.chamber-card').classList.remove('shake'), 600);
            }
        }

        function revealHint() {
            if (sanity < 30) return;
            document.getElementById('riddle-content').innerText = `"${RIDDLES[currentLevel].hint}"`;
            sanity -= 20;
            document.getElementById('stat-sanity').innerText = sanity;
        }

        initProgress();
        updateUI();
    </script>
</body>
</html>
