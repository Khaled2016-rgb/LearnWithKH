<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence | Pro Fluid Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --apple-blue: #0071e3;
            --bg: #000000;
            --text: #f5f5f7;
            --glass: rgba(18, 18, 18, 0.6);
            --border: rgba(255, 255, 255, 0.08);
        }

        .light-mode {
            --bg: #fbfbfd;
            --text: #1d1d1f;
            --glass: rgba(255, 255, 255, 0.5);
            --border: rgba(0, 0, 0, 0.05);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            overflow: hidden;
            transition: background-color 0.8s ease;
        }

        /* Glassmorphism & Fluidity */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .transition-all-custom { 
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        /* Background Animation */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Collapsible States */
        .sidebar-collapsed { 
            width: 0 !important; 
            opacity: 0; 
            transform: translateX(-100px); 
            margin: 0 !important;
            pointer-events: none; 
        }
        
        .header-collapsed { 
            transform: translateY(-110%); 
            margin-bottom: -3.5rem; 
        }

        /* Floating Symbols Dock */
        #symbols-dock {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%) translateX(-120px);
            opacity: 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 40;
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sidebar-collapsed:not(.toolbar-hidden) ~ main #symbols-dock {
            transform: translateY(-50%) translateX(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* Chat bubbles */
        .chat-bubble {
            max-width: 85%;
            padding: 1.25rem 1.75rem;
            border-radius: 28px;
            margin-bottom: 1rem;
            animation: fluidPop 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            line-height: 1.6;
            position: relative;
        }

        @keyframes fluidPop {
            from { transform: scale(0.95) translateY(20px); opacity: 0; filter: blur(10px); }
            to { transform: scale(1) translateY(0); opacity: 1; filter: blur(0); }
        }

        .keypad-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            height: 44px;
            font-size: 13px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .keypad-btn:hover { 
            background: rgba(255, 255, 255, 0.1); 
            transform: translateY(-2px);
            border-color: var(--apple-blue);
        }

        .dock-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .action-btn {
            padding: 0 12px;
            height: 40px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            transition: all 0.2s;
            opacity: 0.5;
        }
        .action-btn:hover { opacity: 1; background: rgba(255, 255, 255, 0.1); }
        .action-btn:active { transform: scale(0.95); }

        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 10px; }

        .disclaimer-bar {
            background: #ff3b30;
            color: white;
            font-size: 10px;
            font-weight: 700;
            text-align: center;
            padding: 4px 0;
            letter-spacing: 0.1em;
            z-index: 100;
            position: relative;
        }
        
        .main-container {
            max-width: 1000px;
            transition: max-width 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .sidebar-collapsed ~ main .main-container {
            max-width: 1100px;
        }
    </style>
</head>
<body class="dark-mode">

    <div class="disclaimer-bar uppercase">
        ⚠️ AI CAN CREATE MISTAKES DUE TO SYNTAX ERRORS OR CALCULATION LIMITS
    </div>

    <canvas id="canvas-bg"></canvas>

    <div class="relative z-10 h-screen flex flex-col">
        <!-- Header -->
        <nav id="top-nav" class="h-14 flex items-center justify-between px-8 glass-panel border-none rounded-none transition-all-custom">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-white/10 rounded-xl transition-colors">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                </button>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-6 bg-blue-500 rounded-full animate-pulse"></div>
                    <span class="text-lg font-bold tracking-tight">Intelligence</span>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-white/10 transition-all" id="theme-toggle">🌙</button>
                <button onclick="toggleHeader()" class="p-2 hover:bg-white/10 rounded-xl transition-all">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6"/></svg>
                </button>
            </div>
        </nav>

        <!-- Floating Return Trigger -->
        <button id="header-trigger" class="fixed top-0 left-1/2 -translate-x-1/2 px-8 py-2 bg-white/10 backdrop-blur-xl rounded-b-3xl opacity-0 hover:opacity-100 transition-all duration-300 z-50 pointer-events-auto hidden shadow-lg" onclick="toggleHeader()">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </button>

        <div class="flex-1 flex overflow-hidden">
            <!-- Sidebar -->
            <aside id="sidebar" class="w-80 glass-panel m-4 flex flex-col pointer-events-auto transition-all-custom overflow-hidden shadow-2xl">
                <div class="p-6 border-b border-white/5">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-40">Symbolic Engine</h2>
                        <span id="memory-indicator" class="text-[10px] text-blue-400 font-mono">M: 0</span>
                    </div>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="keypadInput('sin(')" class="keypad-btn">sin</button>
                        <button onclick="keypadInput('cos(')" class="keypad-btn">cos</button>
                        <button onclick="keypadInput('sqrt(')" class="keypad-btn">√</button>
                        <button onclick="keypadInput('^')" class="keypad-btn">xʸ</button>
                        <button onclick="keypadInput('pi')" class="keypad-btn">π</button>
                        <button onclick="keypadInput('log(')" class="keypad-btn">log</button>
                        <button onclick="memoryClear()" class="keypad-btn text-red-400">MC</button>
                        <button onclick="memoryAdd()" class="keypad-btn text-green-400">M+</button>
                    </div>
                    <button onclick="toggleToolbar()" class="w-full mt-4 py-2 text-[10px] font-bold uppercase tracking-widest bg-white/5 rounded-xl hover:bg-white/10 transition-all">
                        Toggle Quick Dock
                    </button>
                </div>
                
                <div class="p-4 flex flex-col gap-3 overflow-y-auto flex-1 custom-scroll" id="history-log">
                    <div class="text-[10px] opacity-20 text-center mt-20 uppercase tracking-[0.3em]">Historical Log</div>
                </div>
            </aside>

            <!-- Main Workspace -->
            <main class="flex-1 flex flex-col p-4 relative transition-all-custom overflow-hidden">
                <!-- Floating Symbols Dock -->
                <div id="symbols-dock" class="transition-all-custom">
                    <button onclick="keypadInput('sin(')" class="glass-panel dock-btn keypad-btn">sin</button>
                    <button onclick="keypadInput('cos(')" class="glass-panel dock-btn keypad-btn">cos</button>
                    <button onclick="keypadInput('sqrt(')" class="glass-panel dock-btn keypad-btn">√</button>
                    <button onclick="keypadInput('^')" class="glass-panel dock-btn keypad-btn">^</button>
                    <button onclick="keypadInput('pi')" class="glass-panel dock-btn keypad-btn">π</button>
                </div>

                <div id="chat-container" class="flex-1 overflow-y-auto px-6 py-8 custom-scroll pointer-events-auto flex flex-col items-center">
                    <div class="w-full main-container">
                        <!-- Dynamic Greeting Bubble -->
                        <div class="chat-bubble glass-panel self-start border-l-4 border-blue-500 mb-8">
                            <p class="text-[10px] font-bold opacity-40 mb-2 uppercase tracking-widest">System Boot</p>
                            <p id="greeting-text">Initializing...</p>
                        </div>
                    </div>
                </div>

                <!-- Input Box -->
                <div class="w-full main-container mx-auto mt-4 pointer-events-auto relative">
                    <div class="glass-panel rounded-[36px] p-3 flex items-center gap-2 shadow-2xl transition-all duration-500 focus-within:ring-2 ring-blue-500/30">
                        <button id="show-menus-btn" onclick="restoreUI()" class="hidden px-4 text-[10px] font-bold text-blue-400 uppercase tracking-widest hover:scale-105 transition-all">
                            Menus
                        </button>
                        <button onclick="clearChat()" class="px-4 text-[10px] font-bold opacity-30 hover:opacity-100 uppercase tracking-widest transition-opacity">Reset</button>
                        
                        <input id="math-input" type="text" 
                            placeholder="Ask me anything or calculate..." 
                            class="flex-1 bg-transparent border-none outline-none px-4 py-3 text-inherit placeholder-white/20 text-lg font-light">
                        
                        <!-- Quick Actions Cluster -->
                        <div class="flex items-center gap-1 pr-1">
                            <button onclick="copyToClipboard(lastResult)" class="action-btn" title="Copy last result">Copy</button>
                            <button onclick="redoCalculation(lastResult)" class="action-btn" title="Redo last">Redo</button>
                            <button onclick="memoryAdd(lastResult)" class="action-btn" title="Add to memory">M+</button>
                            
                            <button id="solve-btn" class="bg-blue-600 text-white h-14 w-14 rounded-full flex items-center justify-center hover:bg-blue-500 hover:scale-105 transition-all shadow-xl active:scale-95 ml-2">
                                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="flex justify-between px-8 mt-3 opacity-20 text-[9px] font-bold uppercase tracking-[0.4em]">
                        <span>Fluid Symbolic Logic</span>
                        <span>v5.7-Premium</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let scene, camera, renderer, fluidMesh;
        let isDarkMode = true;
        let memory = 0;
        let lastResult = null;

        // --- Fluid Background Engine ---
        function initBackground() {
            const canvas = document.getElementById('canvas-bg');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            const geometry = new THREE.PlaneBufferGeometry(60, 60, 80, 80);
            const material = new THREE.MeshPhongMaterial({
                color: 0x0071e3,
                wireframe: true,
                transparent: true,
                opacity: 0.12,
                side: THREE.DoubleSide
            });
            fluidMesh = new THREE.Mesh(geometry, material);
            fluidMesh.rotation.x = -Math.PI / 2.5;
            scene.add(fluidMesh);

            const light1 = new THREE.PointLight(0x0071e3, 1.2, 100);
            light1.position.set(10, 15, 10);
            scene.add(light1);
            
            const light2 = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(light2);

            camera.position.z = 15;
            camera.position.y = 6;

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.0008;
            const positions = fluidMesh.geometry.attributes.position.array;

            for (let i = 0; i < positions.length; i += 3) {
                const x = positions[i];
                const y = positions[i+1];
                positions[i+2] = Math.sin(x * 0.2 + time) * 0.6 + Math.cos(y * 0.25 + time) * 0.6;
            }
            fluidMesh.geometry.attributes.position.needsUpdate = true;
            fluidMesh.rotation.z += 0.0005;
            
            renderer.render(scene, camera);
        }

        // --- Logic & NLP Engine ---
        const IntelligenceEngine = {
            greetings: ["hi", "hello", "hey", "how are you", "are you fine", "who are you"],
            
            getTimeGreeting: function() {
                const hour = new Date().getHours();
                if (hour < 12) return "Good Morning";
                if (hour < 18) return "Good Afternoon";
                return "Good Evening";
            },

            process: function(input) {
                const raw = input.toLowerCase().trim();
                
                if (this.greetings.some(g => raw.includes(g))) {
                    return `Hello! ${this.getTimeGreeting()}. I am your advanced symbolic assistant. I can solve word problems, perform complex calculations, and visualize 3D functions. How can I assist you today?`;
                }

                let expression = raw
                    .replace(/plus|add/g, '+')
                    .replace(/minus|subtract/g, '-')
                    .replace(/times|multiplied by/g, '*')
                    .replace(/divided by/g, '/')
                    .replace(/square root of/g, 'sqrt')
                    .replace(/the/g, '')
                    .replace(/is|equals/g, '=')
                    .replace(/what/g, '')
                    .replace(/of/g, '')
                    .replace(/[^a-z0-9\s.+\-*/^()]/g, '');

                if (raw.includes('graph') || raw.includes('plot') || raw.includes('3d') || raw.includes('surface')) {
                    const func = raw.replace(/graph|plot|3d|surface|the|function/g, '').trim();
                    const mathFunc = func || "sin(x)*cos(z)";
                    this.render3D(mathFunc);
                    return `Visualizing function: ${mathFunc}. I have rendered a holographic 3D model for you.`;
                }

                try {
                    const evalString = expression
                        .replace(/\^/g, '**')
                        .replace(/sqrt/g, 'Math.sqrt')
                        .replace(/sin/g, 'Math.sin')
                        .replace(/cos/g, 'Math.cos')
                        .replace(/log/g, 'Math.log10')
                        .replace(/pi/g, 'Math.PI')
                        .replace(/e/g, 'Math.E')
                        .replace(/=/g, '');
                    
                    const result = eval(evalString);
                    lastResult = result;
                    return `Result: ${result}`;
                } catch (e) {
                    return "I've analyzed your request, but the syntax seems complex. Try stating the operation directly (e.g., '64 + 10').";
                }
            },

            render3D: function(expr) {
                scene.children.forEach(c => { if(c.isSurface) scene.remove(c); });

                const geometry = new THREE.ParametricBufferGeometry((u, v, target) => {
                    let x = (u - 0.5) * 15;
                    let z = (v - 0.5) * 15;
                    let y = 0;
                    const safe = expr.replace(/sin/g, 'Math.sin').replace(/cos/g, 'Math.cos').replace(/sqrt/g, 'Math.sqrt').replace(/\^/g, '**');
                    try { y = eval(safe); } catch(e) { y = 0; }
                    target.set(x, isNaN(y) ? 0 : y, z);
                }, 60, 60);

                const mat = new THREE.MeshPhongMaterial({ color: 0x0071e3, wireframe: true, transparent: true, opacity: 0.8 });
                const mesh = new THREE.Mesh(geometry, mat);
                mesh.isSurface = true;
                scene.add(mesh);
            }
        };

        // --- UI Functions ---
        function appendChat(text, isUser = false) {
            const container = document.getElementById('chat-container');
            const inner = container.querySelector('.main-container');
            const div = document.createElement('div');
            div.className = `chat-bubble glass-panel self-${isUser ? 'end bg-blue-600 text-white ml-auto' : 'start border-l-4 border-blue-500'}`;
            
            let content = `<p class="text-sm">${text}</p>`;
            
            // Note: Inline actions removed in favor of the persistent Input Cluster actions per request
            div.innerHTML = content;
            inner.appendChild(div);
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }

        function handleSend() {
            const input = document.getElementById('math-input');
            const val = input.value.trim();
            if (!val) return;

            appendChat(val, true);
            input.value = "";

            setTimeout(() => {
                const response = IntelligenceEngine.process(val);
                appendChat(response);
                updateHistory(val, response);
            }, 50);
        }

        function updateHistory(query, res) {
            const log = document.getElementById('history-log');
            const item = document.createElement('div');
            item.className = "p-4 glass-panel border-none bg-white/5 text-[11px] animate-slide mb-2";
            item.innerHTML = `<span class="opacity-30 uppercase text-[8px] font-bold">Query</span><br>${query}<br><div class="h-1 w-8 bg-blue-500 my-2"></div><span class="text-blue-400 font-bold">${res}</span>`;
            log.prepend(item);
        }

        function toggleSidebar() { 
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('sidebar-collapsed'); 
            checkMenuButton();
        }
        
        function toggleHeader() { 
            document.getElementById('top-nav').classList.toggle('header-collapsed');
            document.getElementById('header-trigger').classList.toggle('hidden');
            checkMenuButton();
        }

        function toggleToolbar() {
            document.getElementById('sidebar').classList.toggle('toolbar-hidden');
        }

        function restoreUI() {
            const sidebar = document.getElementById('sidebar');
            const nav = document.getElementById('top-nav');
            if (sidebar.classList.contains('sidebar-collapsed')) toggleSidebar();
            if (nav.classList.contains('header-collapsed')) toggleHeader();
        }

        function checkMenuButton() {
            const isCollapsed = document.getElementById('sidebar').classList.contains('sidebar-collapsed') && 
                              document.getElementById('top-nav').classList.contains('header-collapsed');
            document.getElementById('show-menus-btn').classList.toggle('hidden', !isCollapsed);
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode');
            document.getElementById('theme-toggle').innerText = isDarkMode ? '🌙' : '☀️';
            if (fluidMesh) fluidMesh.material.color.setHex(0x0071e3);
        }

        function keypadInput(v) { document.getElementById('math-input').value += v; document.getElementById('math-input').focus(); }
        
        function copyToClipboard(text) { 
            if (!text) return;
            navigator.clipboard.writeText(text); 
        }
        
        function redoCalculation(val) { 
            if (!val) return;
            document.getElementById('math-input').value = val; 
            document.getElementById('math-input').focus();
        }
        
        function clearChat() { document.querySelector('#chat-container .main-container').innerHTML = ""; }
        
        function memoryAdd(val = lastResult) { 
            if (val !== null) {
                memory += parseFloat(val);
                document.getElementById('memory-indicator').innerText = `M: ${memory.toFixed(2)}`;
            }
        }
        
        function memoryClear() { memory = 0; document.getElementById('memory-indicator').innerText = `M: 0`; }

        window.onload = () => {
            initBackground();
            document.getElementById('greeting-text').innerText = `${IntelligenceEngine.getTimeGreeting()}. I am Intelligence. Workspace ready for your input.`;
        };

        document.getElementById('solve-btn').onclick = handleSend;
        document.getElementById('math-input').onkeydown = (e) => { if(e.key === 'Enter') handleSend(); };
        window.onresize = () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>s
