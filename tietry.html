<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower of Tome: Solid Ground</title>
    <style>
        :root {
            --accent: #d35400;
            --text-color: #f39c12;
            --danger: #e74c3c;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            color: var(--text-color);
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            backdrop-filter: blur(8px);
            background: rgba(0,0,0,0.8);
        }

        .hidden { display: none !important; }

        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 5px; 
            text-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
            letter-spacing: 4px;
            font-weight: 900;
        }

        .menu-btn {
            background: rgba(243, 156, 18, 0.1);
            color: var(--text-color);
            border: 2px solid var(--text-color);
            padding: 12px 30px;
            margin: 10px;
            font-size: 1rem;
            cursor: pointer;
            width: 250px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 8px;
            font-weight: bold;
        }

        .menu-btn:hover {
            background: var(--text-color);
            color: #000;
            box-shadow: 0 0 25px var(--text-color);
        }

        #stats-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-color);
            z-index: 10;
            display: flex;
            gap: 10px;
            pointer-events: none;
        }

        .stat-box {
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 6px;
            border-bottom: 2px solid var(--text-color);
            backdrop-filter: blur(4px);
        }

        .stat-label { font-size: 0.6rem; opacity: 0.7; text-transform: uppercase; }
        .stat-value { font-size: 1rem; font-weight: bold; font-family: monospace; }

        #weather-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            color: #fff;
            font-size: 0.7rem;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 100;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="flash"></div>
    <canvas id="game-canvas"></canvas>
    <div id="weather-indicator">Weather: Calm</div>
    
    <div id="stats-bar">
        <div class="stat-box">
            <div class="stat-label">Floor</div>
            <div class="stat-value" id="lvl-val">1</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Block</div>
            <div class="stat-value" id="height-val">0</div>
        </div>
    </div>

    <div id="main-menu" class="overlay">
        <h1>TOWER OF TOME</h1>
        <p>Step on the 11th block to trigger the surge.</p>
        <button class="menu-btn" onclick="startGame()">Ascend</button>
    </div>

    <div id="level-complete" class="overlay hidden">
        <h1 style="color: #2ecc71;">FLOOR SECURED</h1>
        <p>The flood has claimed the lower levels.</p>
        <button class="menu-btn" onclick="nextLevel()">Go Higher</button>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1 id="death-reason" style="color: var(--danger);">LOST</h1>
        <p id="final-score"></p>
        <button class="menu-btn" onclick="startGame()">Try Again</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const flashEl = document.getElementById('flash');
    const weatherIndicator = document.getElementById('weather-indicator');
    
    let width, height;
    let gameActive = false;
    let score = 0;
    let currentLevel = 1;
    let heightThisLevel = 0;
    const heightPerLevel = 15;
    
    const GRAVITY = 0.55;
    const FRICTION = 0.8;
    const WALL_WIDTH = 60; 
    const BOOK_W = 180;
    const BOOK_H = 45; 
    
    const WEATHER_TYPES = ['CALM', 'WINDY', 'RAINY', 'THUNDER'];
    let currentWeather = 'CALM';
    let weatherTimer = 0;
    let floodY = 20000; 
    let targetFloodY = 20000;
    let windForce = 0;
    let lightningStrike = null;

    const player = {
        x: 0, y: 0, w: 26, h: 38,
        vx: 0, vy: 0,
        speed: 6.5,
        jumpPower: -12.5,
        grounded: false,
        stretch: 1,
        tilt: 0
    };

    let books = [];
    let weatherParticles = [];
    let cameraY = 0;
    let frameCount = 0;
    const keys = {};

    let touchX = null;
    let touchY = null;
    let isSwiping = false;

    function init() {
        resize();
        window.addEventListener('resize', resize);
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        canvas.addEventListener('touchstart', handleStart, {passive: false});
        canvas.addEventListener('touchmove', handleMove, {passive: false});
        canvas.addEventListener('touchend', handleEnd, {passive: false});
        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        requestAnimationFrame(gameLoop);
    }

    function handleStart(e) {
        if (!gameActive) return;
        const pos = e.touches ? e.touches[0] : e;
        touchX = pos.clientX;
        touchY = pos.clientY;
        isSwiping = true;
    }

    function handleMove(e) {
        if (!isSwiping || !gameActive) return;
        if (e.cancelable) e.preventDefault();
        const pos = e.touches ? e.touches[0] : e;
        const dx = pos.clientX - touchX;
        const dy = pos.clientY - touchY;
        if (Math.abs(dx) > 10) player.vx = (dx > 0 ? 1 : -1) * player.speed;
        if (dy < -30) { triggerJump(); isSwiping = false; }
    }

    function handleEnd(e) {
        if (isSwiping && gameActive) {
            const pos = e.changedTouches ? e.changedTouches[0] : e;
            const dist = Math.hypot(pos.clientX - touchX, pos.clientY - touchY);
            if (dist < 10) triggerJump();
        }
        isSwiping = false;
    }

    function triggerJump() {
        if (player.grounded && gameActive) {
            player.vy = player.jumpPower;
            player.grounded = false;
            player.stretch = 1.4;
        }
    }

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    function startGame() {
        document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
        gameActive = true;
        score = 0;
        currentLevel = 1;
        heightThisLevel = 0;
        books = [];
        weatherParticles = [];
        player.x = width / 2 - player.w / 2;
        player.y = height - 150;
        player.vx = 0; player.vy = 0;
        cameraY = 0;
        floodY = height + 500; 
        targetFloodY = height + 500;
        currentWeather = 'CALM';
        weatherTimer = 0;
        
        books.push({
            id: 'floor',
            x: 0, y: height - 60, w: width, h: 600,
            color: '#1a1a1a', isFloor: true,
            landed: true, opacity: 1, originalW: width
        });

        spawnNextBook();
        updateUI();
    }

    function updateUI() {
        document.getElementById('height-val').innerText = heightThisLevel;
        document.getElementById('lvl-val').innerText = currentLevel;
        weatherIndicator.innerText = `Weather: ${currentWeather}`;
    }

    function spawnNextBook() {
        const side = Math.random() > 0.5 ? 'left' : 'right';
        const bookY = (height - 60) - (score + 1) * BOOK_H;
        const targetX = (width / 2) - (BOOK_W / 2) + (Math.random() * 80 - 40);
        
        books.push({
            id: Math.random(),
            x: side === 'left' ? -BOOK_W : width,
            y: bookY, w: BOOK_W, h: BOOK_H, originalW: BOOK_W,
            vx: side === 'left' ? 4.5 : -4.5,
            color: `hsl(${20 + (currentLevel * 45)}, 40%, 30%)`,
            landed: false, targetX: targetX, opacity: 0
        });
    }

    function gameLoop() {
        update();
        render();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        if (!gameActive) return;
        frameCount++;

        weatherTimer++;
        if (weatherTimer > 500) {
            weatherTimer = 0;
            currentWeather = WEATHER_TYPES[(WEATHER_TYPES.indexOf(currentWeather) + 1) % WEATHER_TYPES.length];
            updateUI();
        }

        if (currentWeather === 'WINDY') player.vx += Math.sin(frameCount * 0.05) * 0.3;
        if (currentWeather === 'THUNDER' && frameCount % 150 === 0) triggerLightning();

        if (keys['ArrowLeft'] || keys['KeyA']) player.vx -= 1;
        if (keys['ArrowRight'] || keys['KeyD']) player.vx += 1;
        if (keys['Space'] || keys['ArrowUp'] || keys['KeyW']) triggerJump();

        player.vx *= FRICTION;
        player.vy += GRAVITY;
        player.x += player.vx;
        player.y += player.vy;
        
        player.stretch += (1 - player.stretch) * 0.1;
        player.tilt = player.vx * 0.05;

        let targetCam = -(player.y - height * 0.6);
        cameraY += (targetCam - cameraY) * 0.1;

        if (player.x < WALL_WIDTH) player.x = WALL_WIDTH;
        if (player.x + player.w > width - WALL_WIDTH) player.x = width - WALL_WIDTH - player.w;

        // --- FLOOD SURGE LOGIC ---
        
        // 1. When 2nd block reaches the middle (heightThisLevel becomes 2)
        if (heightThisLevel >= 2 && targetFloodY > books[0].y) {
            targetFloodY = books[0].y + 10; // Flood covers the ground floor
        }

        // 2. Step on 11th block -> Flood reaches 10th block
        if (heightThisLevel >= 11) {
            if (books[10]) {
                const surgePos = books[10].y + 10;
                if (surgePos < targetFloodY) targetFloodY = surgePos;
            }
        }

        // Smoothly animate flood position
        floodY += (targetFloodY - floodY) * 0.05;

        player.grounded = false;
        for (let i = books.length - 1; i >= 0; i--) {
            let b = books[i];

            if (currentWeather === 'RAINY' && b.landed && !b.isFloor) {
                b.w -= 0.15;
                b.x += 0.075;
                if (b.w < 15) { books.splice(i, 1); continue; }
            }

            if (!b.landed) {
                b.x += b.vx;
                b.opacity = Math.min(1, b.opacity + 0.1);
                
                if (player.y + player.h > b.y + 5 && player.y < b.y + b.h - 5) {
                    if (player.x + player.w > b.x && player.x < b.x + b.w) {
                        player.x += b.vx;
                    }
                }

                if ((b.vx > 0 && b.x >= b.targetX) || (b.vx < 0 && b.x <= b.targetX)) {
                    b.x = b.targetX; b.vx = 0; b.landed = true;
                    score++; heightThisLevel++; updateUI();
                    if (heightThisLevel >= heightPerLevel) completeLevel();
                    else spawnNextBook();
                }
            }

            const overlapX = (player.x + player.w > b.x) && (player.x < b.x + b.w);
            const overlapY = (player.y + player.h > b.y) && (player.y < b.y + b.h);

            if (overlapX && overlapY) {
                if (player.vy >= 0 && player.y + player.h - player.vy <= b.y + 15) {
                    player.y = b.y - player.h;
                    player.vy = 0;
                    player.grounded = true;
                } 
                else if (!player.grounded || player.y + player.h > b.y + 10) {
                    const fromLeft = player.x + player.w/2 < b.x + b.w/2;
                    if (fromLeft) { player.x = b.x - player.w; player.vx = Math.min(0, player.vx); }
                    else { player.x = b.x + b.w; player.vx = Math.max(0, player.vx); }
                }
            }
        }

        if (lightningStrike && lightningStrike.active) {
            if (player.x + player.w > lightningStrike.x - 20 && player.x < lightningStrike.x + 20) {
                gameOver("STRUCK BY LIGHTNING");
            }
        }

        if (player.y + cameraY > height + 100) gameOver("FELL INTO OBLIVION");
        if (player.y > floodY) gameOver("DROWNED IN THE SURGE");

        updateParticles();
    }

    function triggerLightning() {
        const lx = WALL_WIDTH + Math.random() * (width - WALL_WIDTH * 2);
        lightningStrike = { x: lx, timer: 30, active: false };
        setTimeout(() => {
            if (!gameActive) return;
            lightningStrike.active = true;
            flashEl.style.opacity = "0.5";
            setTimeout(() => { flashEl.style.opacity = "0"; lightningStrike = null; }, 100);
        }, 600);
    }

    function updateParticles() {
        if (currentWeather === 'RAINY' && weatherParticles.length < 80) {
            weatherParticles.push({ x: Math.random() * width, y: -20, vy: 12, type: 'rain' });
        }
        for (let i = weatherParticles.length - 1; i >= 0; i--) {
            let p = weatherParticles[i];
            p.y += p.vy;
            if (p.y > height) weatherParticles.splice(i, 1);
        }
    }

    function render() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, width, height);

        weatherParticles.forEach(p => {
            ctx.strokeStyle = '#3498db';
            ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y + 15); ctx.stroke();
        });

        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, WALL_WIDTH, height);
        ctx.fillRect(width - WALL_WIDTH, 0, WALL_WIDTH, height);

        ctx.save();
        ctx.translate(0, cameraY);

        books.forEach(b => {
            ctx.globalAlpha = b.opacity;
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fillRect(b.x, b.y, b.w, 4);
            ctx.globalAlpha = 1;
        });

        ctx.fillStyle = 'rgba(20, 40, 80, 0.7)';
        ctx.fillRect(0, floodY, width, 5000);
        ctx.fillStyle = '#3498db';
        ctx.fillRect(0, floodY, width, 4);

        if (lightningStrike) {
            ctx.strokeStyle = lightningStrike.active ? '#fff' : 'rgba(255,255,0,0.2)';
            ctx.lineWidth = lightningStrike.active ? 4 : 1;
            ctx.beginPath(); ctx.moveTo(lightningStrike.x, -cameraY); 
            ctx.lineTo(lightningStrike.x, height - cameraY); ctx.stroke();
        }

        ctx.save();
        ctx.translate(player.x + player.w/2, player.y + player.h);
        ctx.rotate(player.tilt);
        ctx.scale(2 - player.stretch, player.stretch);
        ctx.fillStyle = '#f39c12';
        ctx.fillRect(-player.w/2, -player.h, player.w, player.h);
        ctx.fillStyle = '#000';
        ctx.fillRect(-6, -28, 3, 5); ctx.fillRect(3, -28, 3, 5);
        ctx.restore();
        ctx.restore();
    }

    function completeLevel() {
        gameActive = false;
        // Floor secured -> Flood reaches top block of the current floor
        const topBlock = books[books.length - 1];
        if (topBlock) {
            targetFloodY = topBlock.y + 10;
            floodY = targetFloodY; // Snap instantly for floor completion
        }
        showOverlay('level-complete');
    }

    function nextLevel() {
        currentLevel++;
        heightThisLevel = 0;
        gameActive = true;
        document.getElementById('level-complete').classList.add('hidden');
        // We don't call startGame() because we want to keep climbing from current Y
        score = 0;
        books = [books[books.length-1]]; // Keep only the top block to stand on
        spawnNextBook();
        updateUI();
    }

    function gameOver(reason) {
        gameActive = false;
        document.getElementById('death-reason').innerText = reason;
        document.getElementById('final-score').innerText = `Reached Block ${heightThisLevel} on Floor ${currentLevel}`;
        showOverlay('game-over');
    }

    function showOverlay(id) {
        document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    window.onload = init;
</script>
</body>
</html>
