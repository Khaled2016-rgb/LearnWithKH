<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Decision Architect Pro | Vision Edition - LWKHO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #020617;
            --glass-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #818cf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --sidebar-w: 380px;
            --sidebar-collapsed-w: 88px;
            --apple-ease: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-base: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.08);
            --accent: #4f46e5;
            --text-main: #0f172a;
            --text-dim: #64748b;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
            transition: background-color 0.5s var(--apple-ease), color 0.5s var(--apple-ease), border-color 0.5s var(--apple-ease);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-base);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
        }

        /* Border & Glow Animation */
        @keyframes borderPulse {
            0% { border-color: var(--accent); box-shadow: 0 0 15px rgba(129, 140, 248, 0.2); }
            50% { border-color: #ec4899; box-shadow: 0 0 30px rgba(236, 72, 153, 0.4); }
            100% { border-color: var(--accent); box-shadow: 0 0 15px rgba(129, 140, 248, 0.2); }
        }

        .result-active {
            animation: borderPulse 3s infinite ease-in-out;
            border-width: 1px;
            border-style: solid;
            border-radius: 32px;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.02);
        }

        .shimmer {
            background: linear-gradient(90deg, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0.6) 50%, 
                rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
            -webkit-background-clip: text;
            background-clip: text;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        #cursor-glow {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: opacity 1s ease;
        }

        #sidebar {
            width: var(--sidebar-w);
            height: 100vh;
            background: var(--glass-bg);
            backdrop-filter: blur(50px) saturate(200%);
            border-right: 1px solid var(--glass-border);
            transition: width 0.7s var(--apple-ease);
            display: flex;
            flex-direction: column;
            z-index: 100;
            position: relative;
        }

        #sidebar.collapsed { width: var(--sidebar-collapsed-w); }

        .hide-on-collapse {
            transition: opacity 0.3s var(--apple-ease), transform 0.4s var(--apple-ease);
        }

        #sidebar.collapsed .hide-on-collapse {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-15px);
            position: absolute;
        }

        .nav-item {
            margin: 4px 14px;
            padding: 14px 18px;
            border-radius: 18px;
            color: var(--text-dim);
            transition: all 0.3s var(--apple-ease);
            cursor: pointer;
            display: flex;
            align-items: center;
            position: relative;
        }

        #sidebar.collapsed .nav-item { padding: 14px; justify-content: center; margin: 4px 12px; }

        .nav-item:hover { background: rgba(129, 140, 248, 0.08); color: var(--accent); }
        .nav-item.active { background: var(--accent); color: white; box-shadow: 0 12px 24px -8px var(--accent); }

        #viewport {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            z-index: 1;
        }

        #spinner-container, #slot-container {
            transition: all 0.9s var(--apple-ease);
            filter: drop-shadow(0 40px 80px rgba(0,0,0,0.4));
        }

        .engine-hidden {
            opacity: 0;
            transform: scale(0.85) translateY(30px);
            pointer-events: none;
            position: absolute;
        }

        .engine-visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        #slot-container {
            width: min(1000px, 90vw);
            height: 300px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 56px;
            overflow: hidden;
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }

        .slot-rail {
            display: flex;
            align-items: center;
            height: 100%;
            position: absolute;
            left: 50%;
        }

        .slot-item {
            min-width: 440px;
            height: 180px;
            margin: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: -0.06em;
            transition: transform 0.3s var(--apple-ease);
        }

        .apple-btn {
            background: var(--text-main);
            color: var(--bg-base);
            padding: 22px 72px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            transition: all 0.4s var(--apple-ease);
            border: 1px solid transparent;
        }

        .apple-btn:hover {
            transform: scale(1.04) translateY(-3px);
            box-shadow: 0 35px 70px -15px rgba(0,0,0,0.3);
            border-color: var(--accent);
        }

        .apple-btn:active { transform: scale(0.96); }

        .theme-toggle {
            width: 54px;
            height: 28px;
            background: var(--glass-border);
            border-radius: 100px;
            position: relative;
            cursor: pointer;
            padding: 4px;
        }

        .theme-toggle-knob {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.5s var(--apple-ease);
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }

        [data-theme="light"] .theme-toggle-knob { transform: translateX(26px); background: #1e293b; }

        .tooltip {
            position: absolute;
            left: 100%;
            margin-left: 20px;
            background: rgba(15, 23, 42, 0.95);
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(-12px);
            transition: all 0.3s var(--apple-ease);
            pointer-events: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #sidebar.collapsed .nav-item:hover .tooltip { opacity: 1; transform: translateX(0); }

        textarea {
            background: rgba(0,0,0,0.25) !important;
            border: 1px solid var(--glass-border) !important;
            color: var(--text-main) !important;
            transition: border-color 0.3s;
        }
        textarea:focus { border-color: var(--accent) !important; }

        [data-theme="light"] textarea { background: rgba(255,255,255,0.6) !important; }

        #toggle-chevron {
            transition: transform 0.6s var(--apple-ease);
        }
        #sidebar.collapsed #toggle-chevron { transform: rotate(180deg); }
    </style>
</head>
<body data-theme="dark">

    <div id="cursor-glow"></div>

    <aside id="sidebar" class="collapsed">
        <div class="p-8 flex items-center justify-between">
            <div class="flex items-center gap-4 overflow-hidden">
                <div class="w-11 h-11 rounded-2xl bg-indigo-600 flex items-center justify-center shrink-0 shadow-xl shadow-indigo-500/20">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                </div>
                <div class="hide-on-collapse">
                    <h1 class="font-black tracking-tight text-xl leading-none">ARCHITECT</h1>
                    <p class="text-[9px] font-black tracking-[0.4em] text-indigo-400 mt-1 opacity-80 uppercase">Cognitive Core</p>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center hover:bg-white/10 rounded-full transition-all group">
                <svg id="toggle-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
        </div>

        <div class="flex-1 mt-6 space-y-1">
            <div id="nav-wheel" class="nav-item active" onclick="setEngine('wheel')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10Z"/><path d="m12 12 4-4"/><circle cx="12" cy="12" r="1.5"/></svg>
                <span class="ml-4 hide-on-collapse font-bold text-sm tracking-tight">Orbital Canvas</span>
                <div class="tooltip">Orbital Canvas</div>
            </div>
            <div id="nav-slot" class="nav-item" onclick="setEngine('slot')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
                <span class="ml-4 hide-on-collapse font-bold text-sm tracking-tight">Kinetic Rail</span>
                <div class="tooltip">Kinetic Rail</div>
            </div>
        </div>

        <div class="hide-on-collapse p-8 space-y-8">
            <div class="space-y-4">
                <div class="flex justify-between items-end px-1">
                    <label class="text-[10px] font-black uppercase tracking-[0.25em] text-slate-500 opacity-70">Knowledge Base</label>
                    <span id="node-count" class="text-[10px] font-black text-indigo-400 bg-indigo-500/10 px-2.5 py-1 rounded-lg">8 NODES</span>
                </div>
                <textarea id="options-input" class="w-full rounded-2xl p-5 h-52 resize-none mono text-sm shadow-inner transition-all outline-none" spellcheck="false" placeholder="Enter options separated by lines..."></textarea>
                <button onclick="updateOptions()" class="w-full py-4 bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-400 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-indigo-500/20 transition-all">Synchronize Nodes</button>
            </div>

            <div class="flex items-center justify-between p-5 bg-black/20 rounded-3xl border border-white/5">
                <div class="space-y-0.5">
                    <p class="text-[10px] font-black uppercase text-slate-200 tracking-wider">Auto-Pruning</p>
                    <p class="text-[9px] text-slate-500 font-bold">Remove chosen options</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="elim-mode" class="sr-only peer">
                    <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-500"></div>
                </label>
            </div>
        </div>

        <div class="p-8 border-t border-white/5 space-y-6 bg-black/5">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse shadow-[0_0_10px_#22c55e]"></div>
                    <span class="hide-on-collapse text-[10px] font-black uppercase text-slate-500 tracking-widest">Neural Link Live</span>
                </div>
                <div class="theme-toggle" onclick="toggleTheme()">
                    <div class="theme-toggle-knob"></div>
                </div>
            </div>
        </div>
    </aside>

    <main id="viewport">
        <div id="spinner-container" class="engine-visible">
            <div class="absolute top-[-50px] left-1/2 -translate-x-1/2 z-20">
                <div class="w-14 h-20 bg-indigo-500 shadow-2xl shadow-indigo-500/50" style="clip-path: polygon(50% 100%, 0 0, 100% 0);"></div>
            </div>
            <canvas id="wheel-canvas" width="1200" height="1200" class="w-[min(72vh,620px)] h-[min(72vh,620px)]"></canvas>
        </div>

        <div id="slot-container" class="engine-hidden">
            <div id="slot-pointer" class="absolute inset-y-0 left-1/2 w-[4px] bg-indigo-500 z-20 shadow-[0_0_40px_#818cf8] transition-all duration-300"></div>
            <div class="slot-rail" id="slot-rail"></div>
        </div>

        <div class="mt-20 text-center space-y-12 max-w-4xl">
            <div id="result-box" style="display:none;" class="opacity-0 translate-y-12 transition-all duration-1000 scale-90">
                <p id="result-label" class="text-[11px] font-black tracking-[0.5em] text-indigo-400 uppercase mb-4 opacity-60">Architect Sequence Complete</p>
                <div id="result-wrapper" class="">
                    <h2 id="result-text" class="text-7xl lg:text-9xl font-black tracking-tighter shimmer"></h2>
                </div>
            </div>

            <div class="space-y-8">
                <button onclick="runEngine()" class="apple-btn group">
                    <span class="relative z-10">Generate Outcome</span>
                </button>
                <p class="text-[10px] text-slate-500 font-bold tracking-[0.4em] uppercase opacity-30">Hotkeys: Space (Run) • M (Switch Mode)</p>
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const optionsInput = document.getElementById('options-input');
        const slotRail = document.getElementById('slot-rail');
        const sidebar = document.getElementById('sidebar');
        const glow = document.getElementById('cursor-glow');
        const resultBox = document.getElementById('result-box');
        const resultWrapper = document.getElementById('result-wrapper');
        const resultLabel = document.getElementById('result-label');
        const slotPointer = document.getElementById('slot-pointer');
        
        let options = ["STRATEGY", "EXECUTION", "GROWTH", "PIVOT", "INNOVATE", "SCALE", "REFINE", "CULTURE"];
        let colors = ['#6366f1', '#a855f7', '#ec4899', '#f43f5e', '#f97316', '#eab308', '#22c55e', '#06b6d4'];
        let rotation = 0;
        let isSpinning = false;
        let activeMode = 'wheel';

        window.addEventListener('mousemove', e => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        const AudioEngine = (() => {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            return {
                resume: () => context.resume(),
                tick: (f = 200, vol = 0.02) => {
                    const o = context.createOscillator(), g = context.createGain();
                    o.type = 'sine'; o.frequency.setValueAtTime(f, context.currentTime);
                    g.gain.setValueAtTime(vol, context.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.1);
                    o.connect(g); g.connect(context.destination);
                    o.start(); o.stop(context.currentTime + 0.1);
                },
                success: () => {
                    [523, 659, 783, 1046].forEach((f, i) => {
                        const o = context.createOscillator(), g = context.createGain();
                        o.frequency.setValueAtTime(f, context.currentTime + i * 0.1);
                        g.gain.setValueAtTime(0.05, context.currentTime + i * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + i * 0.1 + 0.8);
                        o.connect(g); g.connect(context.destination);
                        o.start(context.currentTime + i * 0.1); o.stop(context.currentTime + i * 0.1 + 0.8);
                    });
                }
            };
        })();

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', next);
            if (activeMode === 'wheel') drawWheel();
        }

        function toggleSidebar() { sidebar.classList.toggle('collapsed'); }

        function setEngine(mode) {
            if (isSpinning) return;
            activeMode = mode;
            const w = document.getElementById('spinner-container');
            const s = document.getElementById('slot-container');
            
            // Clear current result view when switching modes
            resultBox.classList.add('opacity-0');
            resultWrapper.classList.remove('result-active');
            
            if (mode === 'wheel') {
                w.classList.replace('engine-hidden', 'engine-visible');
                s.classList.replace('engine-visible', 'engine-hidden');
                drawWheel();
            } else {
                s.classList.replace('engine-hidden', 'engine-visible');
                w.classList.replace('engine-visible', 'engine-hidden');
                initSlot();
            }
            document.getElementById('nav-wheel').classList.toggle('active', mode === 'wheel');
            document.getElementById('nav-slot').classList.toggle('active', mode === 'slot');
            AudioEngine.tick(400);
        }

        function updateOptions() {
            const lines = optionsInput.value.split('\n').filter(l => l.trim() !== "");
            if (lines.length > 0) {
                options = lines;
                document.getElementById('node-count').innerText = `${options.length} NODES`;
                if (activeMode === 'wheel') drawWheel(); else initSlot();
            }
        }

        function drawWheel() {
            const dim = 1200, cx = 600, cy = 600, r = 580;
            ctx.clearRect(0,0,dim,dim);
            const slice = (Math.PI * 2) / options.length;
            
            options.forEach((text, i) => {
                const ang = rotation + i * slice;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, ang, ang + slice);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                
                ctx.save();
                ctx.globalCompositeOperation = 'overlay';
                const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
                grad.addColorStop(0, 'rgba(255,255,255,0.25)');
                grad.addColorStop(1, 'rgba(0,0,0,0.45)');
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.restore();

                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(ang + slice/2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "900 46px 'Plus Jakarta Sans'";
                ctx.shadowColor = "rgba(0,0,0,0.4)";
                ctx.shadowBlur = 20;
                ctx.fillText(text.toUpperCase().substring(0,18), r - 90, 16);
                ctx.restore();
            });

            ctx.beginPath();
            ctx.arc(cx, cy, 90, 0, Math.PI*2);
            ctx.fillStyle = document.body.getAttribute('data-theme') === 'dark' ? '#0f172a' : '#ffffff';
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.lineWidth = 10;
            ctx.stroke();
        }

        function initSlot() {
            slotRail.innerHTML = '';
            const itemWidth = 460; 
            for (let i = 0; i < 40; i++) {
                options.forEach((opt, idx) => {
                    const el = document.createElement('div');
                    el.className = 'slot-item';
                    el.innerText = opt.toUpperCase();
                    el.style.color = colors[idx % colors.length];
                    slotRail.appendChild(el);
                });
            }
            slotRail.style.transform = `translateX(0px)`;
        }

        function runEngine() {
            if (isSpinning || options.length === 0) return;
            AudioEngine.resume();
            isSpinning = true;
            
            document.getElementById('status-dot').className = "w-2.5 h-2.5 rounded-full bg-amber-500 animate-bounce";
            resultBox.classList.add('opacity-0');
            resultWrapper.classList.remove('result-active');
            
            if (activeMode === 'wheel') spinWheel();
            else swipeSlot();
        }

        function spinWheel() {
            const duration = 6000 + Math.random() * 2000;
            const start = performance.now();
            const startRot = rotation;
            const totalRot = 50 + Math.random() * 30;
            let lastTick = 0;

            function animate(t) {
                const p = Math.min((t - start) / duration, 1);
                const ease = 1 - Math.pow(1 - p, 5); 
                rotation = startRot + (totalRot * ease);
                
                const slice = (Math.PI * 2) / options.length;
                if (Math.floor(rotation / slice) !== lastTick) {
                    AudioEngine.tick(300 + (1-p)*400, 0.02 + (1-p)*0.03);
                    lastTick = Math.floor(rotation / slice);
                }

                drawWheel();
                if (p < 1) requestAnimationFrame(animate);
                else finalizeResult();
            }
            requestAnimationFrame(animate);
        }

        function swipeSlot() {
            const itemWidth = 460;
            const winnerIdx = Math.floor(Math.random() * options.length);
            const targetPos = -(((20 * options.length) + winnerIdx) * itemWidth + (itemWidth / 2));
            const duration = 8000;
            const start = performance.now();
            let lastIdx = 0;

            slotPointer.classList.add('scale-y-110', 'bg-pink-500');

            function animate(t) {
                const p = Math.min((t - start) / duration, 1);
                const ease = 1 - Math.pow(1 - p, 5);
                const x = targetPos * ease;
                slotRail.style.transform = `translateX(${x}px)`;
                
                const curIdx = Math.floor(Math.abs(x) / itemWidth);
                if (curIdx !== lastIdx) {
                    AudioEngine.tick(200 + (1-p)*500, 0.01 + (1-p)*0.04);
                    lastIdx = curIdx;
                }

                if (p < 1) requestAnimationFrame(animate);
                else {
                    slotPointer.classList.remove('scale-y-110', 'bg-pink-500');
                    finalizeResult(winnerIdx);
                }
            }
            requestAnimationFrame(animate);
        }

        function finalizeResult(slotIdx) {
            isSpinning = false;
            document.getElementById('status-dot').className = "w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse shadow-[0_0_10px_#22c55e]";
            
            let name, idx;
            if (activeMode === 'wheel') {
                const slice = (Math.PI * 2) / options.length;
                const norm = (rotation + Math.PI/2) % (Math.PI * 2);
                idx = (options.length - Math.floor(norm / slice)) % options.length;
                name = options[idx];
            } else {
                idx = slotIdx;
                name = options[idx];
            }

            const resText = document.getElementById('result-text');
            resText.innerText = name;
            resText.style.color = colors[idx % colors.length];
            
            // Display Result with Border Animation
            resultBox.className = "opacity-100 translate-y-0 scale-100 transition-all duration-1000 cubic-bezier(0.175, 0.885, 0.32, 1.275)";
            resultWrapper.className = "result-active";
            
            AudioEngine.success();

            if (document.getElementById('elim-mode').checked) {
                setTimeout(() => {
                    options.splice(idx, 1);
                    optionsInput.value = options.join('\n');
                    updateOptions();
                    
                    if (activeMode === 'wheel') {
                        rotation = 0;
                        drawWheel();
                    } else {
                        initSlot();
                    }
                }, 4000);
            }
        }

        window.addEventListener('keydown', e => {
            if (document.activeElement === optionsInput) return;
            if (e.code === 'Space') { e.preventDefault(); runEngine(); }
            if (e.code === 'KeyM') setEngine(activeMode === 'wheel' ? 'slot' : 'wheel');
        });

        optionsInput.value = options.join('\n');
        drawWheel();
    </script>
</body>
</html>
